version: '3.8'

services:

  backend:
    build: .
    container_name: cafespot-backend
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
    restart: unless-stopped

  frontend:
    image: nginx:alpine
    container_name: cafespot-frontend
    ports:
      - "8081:80"
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html
      - ./css:/usr/share/nginx/html/css
      - ./js:/usr/share/nginx/html/js
    depends_on:
      - backend
    restart: unless-stopped
