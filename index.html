<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CafeSpot — Find Sydney's Best Cafes</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- Background grain overlay -->
  <div class="grain-overlay"></div>

  <!-- Hero Header -->
  <header class="hero">
    <div class="hero-inner">
      <div class="logo-lockup">
        <span class="logo-icon">☕</span>
        <h1 class="logo-text">CafeSpot</h1>
      </div>
      <p class="tagline">Discover Sydney's finest cafes, right around the corner.</p>
    </div>
  </header>

  <!-- Search Section -->
  <section class="search-section">
    <div class="search-container">
      <form id="search-form" autocomplete="off">
        <div class="search-box">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input
            type="text"
            id="suburb-input"
            placeholder="Enter a Sydney suburb… e.g. Surry Hills"
            autocomplete="off"
          />
          <button type="submit" id="search-btn">
            <span>Search</span>
          </button>
        </div>
        <div id="validation-msg" class="validation-msg"></div>
      </form>
      <div id="autocomplete-dropdown" class="autocomplete-dropdown hidden"></div>
    </div>
  </section>

  <!-- Map + Results -->
  <main class="main-content">
    <!-- Map -->
    <div class="map-wrapper" id="map-wrapper">
      <div id="map"></div>
      <div class="map-placeholder" id="map-placeholder">
        <span>🗺️</span>
        <p>Search a suburb to see cafes on the map</p>
      </div>
    </div>

    <!-- Results Panel -->
    <section class="results-section" id="results-section">
      <!-- Loading State -->
      <div id="loading-state" class="loading-state hidden">
        <div class="spinner"></div>
        <p>Finding cafes nearby…</p>
      </div>

      <!-- Error State -->
      <div id="error-state" class="error-state hidden">
        <span>⚠️</span>
        <p id="error-msg">Something went wrong. Please try again.</p>
      </div>

      <!-- Empty State -->
      <div id="empty-state" class="empty-state hidden">
        <span>🔍</span>
        <p>No cafes found within 5km of that suburb.</p>
      </div>

      <!-- Results Header -->
      <div id="results-header" class="results-header hidden">
        <h2 id="results-title">Cafes near <span id="suburb-name"></span></h2>
        <p id="results-count"></p>
      </div>

      <!-- Results Grid -->
      <div id="results-grid" class="results-grid"></div>
    </section>
  </main>

  <!-- Cafe Detail Modal -->
  <div id="cafe-modal" class="modal-overlay hidden">
    <div class="modal-card">
      <button class="modal-close" id="modal-close">✕</button>
      <div id="modal-content"></div>
    </div>
  </div>

  <footer class="site-footer">
    <p>Powered by Google Maps Platform</p>
  </footer>

  <!-- Google Maps JS API (loaded dynamically by app.js) -->
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
